<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="1.css">
</head>
<body>
    <header>
        <h1>
            SHOP PRODUCTS
        </h1>
    </header>
    <div class="grid">
        <article class="card">
            <div class="img">
                <img src="https://www.laptopstoreindia.in/wp-content/uploads/2022/02/laptop-asus.jpg" alt="Laptop">
            </div>
            <div class="content">
                <h2>Laptop</h2>
                <span class="price">$19.99</span>
                <button>"BUY NOW"</button>
            </div>
        </article>
         <article class="card">
            <div class="img">
                <img src="https://cdn.pixabay.com/photo/2016/12/19/08/39/mobile-phone-1917737_640.jpg" alt="Mobile">
            </div>
            <div class="content">
                <h2>Mobile</h2>
                <span class="price">$9.99</span>
                <button>"BUY NOW"</button>
            </div>
        </article>
         <article class="card">
            <div class="img">
                <img src="https://media.istockphoto.com/id/1089821106/photo/kid-hands-with-tablet-computer-on-yellow-background.jpg?s=612x612&w=0&k=20&c=cF8_VS59olZZk2h2nAFcElNirMFp6UkEkURjE8prZ2Y=" alt="Tablet">
            </div>
            <div class="content">
                <h2>Tablet</h2>
                <span class="price">$14.99</span>
                <button>"BUY NOW"</button>
            </div>
        </article>
         <article class="card">
            <div class="img">
                <img src="https://img.freepik.com/premium-photo/close-up-headphones-table_1048944-23589680.jpg?semt=ais_hybrid&w=740&q=80" alt="Headphones">
            </div>
            <div class="content">
                <h2>Headphones</h2>
                <span class="price">$4.99</span>
                <button>"BUY NOW"</button>
            </div>
    </div>
</body>
</html>
